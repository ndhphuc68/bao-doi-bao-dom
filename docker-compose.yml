services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Giao diện web xem/sửa PostgreSQL (http://localhost:8080)
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://root:root@db:5432/appdb?schema=public
      # Trình duyệt gọi API từ http://localhost:3000 — phải khớp CORS
      FRONTEND_ORIGIN: http://localhost:3000,http://127.0.0.1:3000,http://${LOCAL_IP:-192.168.1.211}:3000,http://localhost:3002,http://127.0.0.1:3002,http://${LOCAL_IP:-192.168.1.211}:3002
      # Bind mount (đặc biệt Windows/macOS): bắt buộc polling để file đổi là Nest restart
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3001:3000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NUXT_PUBLIC_API_BASE: http://${LOCAL_IP:-192.168.1.211}:3001
      NUXT_HOST: 0.0.0.0
      HOST: 0.0.0.0
      PORT: "3000"
      # Vite/Chokidar trong container: HMR khi sửa file trên host
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile.dev
    environment:
      NUXT_PUBLIC_API_BASE: http://${LOCAL_IP:-192.168.1.211}:3001
      NUXT_PUBLIC_ADMIN_EMAILS: ${NUXT_PUBLIC_ADMIN_EMAILS:-}
      NUXT_HOST: 0.0.0.0
      HOST: 0.0.0.0
      PORT: "3002"
      # Vite/Chokidar trong container: HMR khi sửa file trên host
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3002:3002"
    depends_on:
      - backend
    volumes:
      - ./admin-frontend:/app
      - admin_frontend_node_modules:/app/node_modules

  # Cloudflare Tunnel: tạo token ở Zero Trust → Networks → Tunnels → docker compose --profile tunnel up
  # Public Hostnames (origin) dùng tên service Docker: http://frontend:3000, http://backend:3000, http://admin-frontend:3002
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend
      - admin-frontend

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
  admin_frontend_node_modules:
