services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://root:root@db:5432/appdb?schema=public
      # Trình duyệt gọi API từ http://localhost:3000 — phải khớp CORS
      FRONTEND_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      # Bind mount (đặc biệt Windows/macOS): bắt buộc polling để file đổi là Nest restart
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3001:3000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
      NUXT_HOST: 0.0.0.0
      HOST: 0.0.0.0
      PORT: "3000"
      # Vite/Chokidar trong container: HMR khi sửa file trên host
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
